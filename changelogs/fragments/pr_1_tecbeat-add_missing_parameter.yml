minor_changes:
  - added missing parameters to proxy module (thanks @tecbeat):
      - hsts_enabled (bool) - Enable HTTP Strict Transport Security
      - hsts_subdomains (bool) - Include subdomains in HSTS policy
      - trust_forwarded_proto (bool) - Trust X-Forwarded-Proto header
      - advanced_config (str) - Custom nginx configuration snippets
      - block_exploits (bool) - Enable common exploit blocking
      - access_list_id (int) - Assign access list to proxy host

