ancestor: null
releases:
  1.0.0:
    changes:
      release_summary:
        "This is the first proper release of ``nils_ost.proxymanager``
        collection on 2026-01-07.

        The added Modules and Roles were just carried over from other local projects.

        This, as my first ever ansible collection release, is in memory of my grandfather
        who passed away today...

        "
    fragments:
      - v1.0.0.yml
    modules:
      - description: create or delete npm certificate.
        name: certificate
        namespace: ""
      - description: create, update or delete npm proxy.
        name: proxy
        namespace: ""
      - description: create, update or delete npm redirection.
        name: redirection
        namespace: ""
      - description: fetch npm API token (login).
        name: token
        namespace: ""
    objects:
      role:
        - description: configures Nginx Proxy Manager with basic capabilities.
          name: basic_config
          namespace: null
        - description: installs Nginx Proxy Manager within docker.
          name: install_with_docker
          namespace: null
    release_date: "2026-01-07"
  2.0.0:
    changes:
      breaking_changes:
        - Default path of `proxymanager_compose_dir` for role `install_with_docker`
          changed from `~/proxymanager` to `/opt/proxymanager`
      bugfixes:
        - Examples in modules referenced wrong module-name
      known_issues:
        - Locations parameter (complex array structure) not yet implemented but documented
          in TODO.md
      minor_changes:
        - Added missing parameters to proxy module (thanks @tecbeat) (hsts_enabled,
          hsts_subdomains, trust_forwarded_proto, advanced_config, block_exploits, access_list_id)
      release_summary:
        "Merged PR of @tecbeat, that added missing parameters (see
        below)

        Changed default compose path for docker installations

        "
    fragments:
      - pr_1_tecbeat-add_missing_parameter.yml
      - v2.0.0.yml
    release_date: "2026-04-03"
